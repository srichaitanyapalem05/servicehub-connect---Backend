services:
  - type: web
    name: servicehub-backend
    runtime: node
    buildCommand: pnpm install
    startCommand: pnpm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 3000
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: BYPASS_OTP
        value: "false"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: FRONTEND_URL
        sync: false
